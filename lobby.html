<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rocket League Lobby Ratings</title>
    <link rel="stylesheet" href="./lobby.css" />
  </head>
  <body>
    <main class="lobby-shell">
      <header class="lobby-header">
        <div>
          <p>Rocket League Stats API</p>
          <h1>Lobby Ratings</h1>
        </div>
        <div class="status" id="status">
          <span id="statusDot" aria-hidden="true"></span>
          <span id="statusText">Connecting</span>
        </div>
      </header>

      <section class="teams" aria-live="polite">
        <article class="team team-blue">
          <h2>Blue</h2>
          <div class="player-list" id="bluePlayers">
            <p class="empty">Waiting for lobby data</p>
          </div>
        </article>

        <article class="team team-orange">
          <h2>Orange</h2>
          <div class="player-list" id="orangePlayers">
            <p class="empty">Waiting for lobby data</p>
          </div>
        </article>
      </section>

      <p class="note" id="note">
        MMR is not exposed by the official Stats API. Add <code>mmr.json</code> to show known ratings.
      </p>
    </main>

    <script src="./lobby.js"></script>
  </body>
</html>
